<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>每日选股 - 策略回测工作台</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f8fafc",
                        "text-main": "#0f172a",
                        "text-muted": "#64748b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .board-pill-active {
            border-color: #135bec !important;
            background-color: #eff6ff !important;
            color: #135bec !important;
        }
    </style>
</head>

<body class="bg-background-light text-text-main font-display h-screen flex flex-col overflow-hidden">
    <header
        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 px-6 py-3 bg-white z-20 shrink-0 shadow-sm">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-3 text-text-main">
                <div class="size-8 text-primary">
                    <span class="material-symbols-outlined !text-3xl">query_stats</span>
                </div>
                <h2 class="text-xl font-bold leading-tight tracking-[-0.015em]">策略回测工作台</h2>
            </div>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-text-muted hover:text-primary text-sm font-medium transition-colors" href="/">新建回测</a>
                <a class="text-primary text-sm font-bold" href="/select">每日选股</a>
                <a class="text-text-muted hover:text-primary text-sm font-medium transition-colors"
                    href="/history">回测历史</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <div
                class="hidden sm:flex w-64 items-center rounded-lg bg-slate-100 border border-transparent focus-within:border-primary transition-colors focus-within:bg-white focus-within:ring-2 focus-within:ring-primary/20">
                <div class="pl-3 text-slate-400 flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl">search</span>
                </div>
                <input
                    class="w-full bg-transparent border-none text-sm text-text-main placeholder:text-slate-400 focus:ring-0 h-9"
                    placeholder="搜索详情..." />
            </div>
            <button class="flex items-center justify-center text-text-muted hover:text-primary transition-colors">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <div class="size-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs cursor-pointer border border-primary/20"
                title="用户资料">
                JD
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <!-- 侧边栏：配置参数 -->
        <aside class="w-80 flex flex-col border-r border-slate-200 bg-white overflow-y-auto shrink-0 custom-scrollbar">
            <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                <h3 class="text-lg font-bold text-slate-900 mb-1">选股配置</h3>
                <p class="text-xs text-slate-500">挑选当日符合信号之个股</p>
            </div>

            <div class="p-5 flex flex-col gap-6">
                <!-- 选股日期 -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400">选股日期</label>
                    <input id="target-date" type="date" value="2026-03-02"
                        class="w-full h-10 px-3 rounded-lg border border-slate-300 bg-white text-sm font-semibold focus:ring-2 focus:ring-primary focus:border-transparent outline-none" />
                </div>

                <!-- 策略模型 -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400">选择策略模型</label>
                    <div class="relative">
                        <select id="strategy-selector"
                            class="w-full h-10 rounded-lg border border-slate-300 bg-white text-sm font-medium focus:ring-2 focus:ring-primary focus:border-transparent appearance-none px-3">
                            <option value="brick">砖型图打分策略</option>
                            <option value="rsv">RSV背离轮动</option>
                            <option value="small_bank">小市值轮动</option>
                        </select>
                        <div
                            class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 flex items-center">
                            <span class="material-symbols-outlined text-sm">expand_more</span>
                        </div>
                    </div>
                </div>

                <!-- 过滤条件 -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400">板块排除</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label
                            class="cursor-pointer border border-slate-200 rounded-lg p-2.5 flex items-center gap-2 hover:bg-slate-50 transition-colors group">
                            <input type="checkbox" id="exclude-st" checked
                                class="rounded text-primary focus:ring-primary w-4 h-4">
                            <span
                                class="text-xs font-bold text-slate-600 group-hover:text-primary transition-colors">ST/退市</span>
                        </label>
                        <label
                            class="cursor-pointer border border-slate-200 rounded-lg p-2.5 flex items-center gap-2 hover:bg-slate-50 transition-colors group">
                            <input type="checkbox" id="exclude-kc"
                                class="rounded text-primary focus:ring-primary w-4 h-4">
                            <span
                                class="text-xs font-bold text-slate-600 group-hover:text-primary transition-colors">科创板</span>
                        </label>
                        <label
                            class="cursor-pointer border border-slate-200 rounded-lg p-2.5 flex items-center gap-2 hover:bg-slate-50 transition-colors group">
                            <input type="checkbox" id="exclude-cy"
                                class="rounded text-primary focus:ring-primary w-4 h-4">
                            <span
                                class="text-xs font-bold text-slate-600 group-hover:text-primary transition-colors">创业板</span>
                        </label>
                        <label
                            class="cursor-pointer border border-slate-200 rounded-lg p-2.5 flex items-center gap-2 hover:bg-slate-50 transition-colors group">
                            <input type="checkbox" id="exclude-bse"
                                class="rounded text-primary focus:ring-primary w-4 h-4">
                            <span
                                class="text-xs font-bold text-slate-600 group-hover:text-primary transition-colors">北交所</span>
                        </label>
                    </div>
                </div>

                <div class="pt-4">
                    <button id="run-select-btn"
                        class="w-full bg-primary text-white py-4 rounded-xl font-black text-sm shadow-lg shadow-primary/20 hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                        <span class="material-symbols-outlined font-black">search</span>
                        开始选股
                    </button>
                </div>
            </div>
        </aside>

        <!-- 内容区：选股结果 -->
        <section class="flex-1 bg-slate-50 min-w-0 overflow-y-auto custom-scrollbar p-8">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-3xl font-black text-slate-900 tracking-tight">选股结果</h1>
                        <p id="result-info" class="text-slate-500 mt-1 font-medium">请配置参数并点击“开始选股”</p>
                    </div>
                    <div id="loading-spinner" class="hidden">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                    </div>
                </div>

                <!-- 进度日志区域 -->
                <div id="log-console"
                    class="hidden mb-6 bg-slate-900 rounded-xl p-4 font-mono text-xs overflow-hidden border border-slate-800 shadow-2xl">
                    <div class="flex items-center justify-between mb-2 pb-2 border-b border-white/10">
                        <span class="text-slate-400 flex items-center gap-2">
                            <span class="relative flex h-2 w-2">
                                <span
                                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                            </span>
                            选股任务执行中...
                        </span>
                        <span id="log-progress" class="text-primary font-bold">0%</span>
                    </div>
                    <div id="log-lines"
                        class="text-slate-300 space-y-1 max-h-40 overflow-y-auto custom-scrollbar scroll-smooth">
                        <!-- 日志内容 -->
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200">
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">代码
                                </th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">名称
                                </th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">收盘价
                                </th>
                                <th
                                    class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">
                                    综合得分</th>
                                <th
                                    class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">
                                    建议</th>
                            </tr>
                        </thead>
                        <tbody id="result-table-body" class="divide-y divide-slate-100">
                            <!-- 数据行将通过 JS 动态插入 -->
                            <tr>
                                <td colspan="5" class="px-6 py-20 text-center text-slate-400 font-medium">
                                    暂无数据，请运行选股任务
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const runBtn = document.getElementById('run-select-btn');
        const tableBody = document.getElementById('result-table-body');
        const resultInfo = document.getElementById('result-info');
        const spinner = document.getElementById('loading-spinner');
        const logConsole = document.getElementById('log-console');
        const logLines = document.getElementById('log-lines');
        const logProgress = document.getElementById('log-progress');

        runBtn.addEventListener('click', async () => {
            const date = document.getElementById('target-date').value;
            const strategy = document.getElementById('strategy-selector').value;

            let excludes = [];
            if (document.getElementById('exclude-st').checked) excludes.push('st');
            if (document.getElementById('exclude-kc').checked) excludes.push('kc');
            if (document.getElementById('exclude-cy').checked) excludes.push('cy');
            if (document.getElementById('exclude-bse').checked) excludes.push('bse');

            // UI Init
            runBtn.disabled = true;
            spinner.classList.remove('hidden');
            logConsole.classList.remove('hidden');
            logLines.innerHTML = '';
            logProgress.textContent = '0%';
            resultInfo.textContent = '正在启动云端选股引擎...';
            tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-20 text-center text-slate-400 font-medium animate-pulse">后台正在计算，结果稍后呈现...</td></tr>';

            const url = `/api/start_select_stocks?date=${date}&strategy=${strategy}&exclude=${excludes.join(',')}`;
            const eventSource = new EventSource(url);

            eventSource.onmessage = (event) => {
                if (event.data === "DONE") {
                    eventSource.close();
                    fetchFinalResults();
                } else {
                    try {
                        const msg = JSON.parse(event.data);
                        addLog(msg.message, msg.level);

                        // 提取百分比进度（如果有）
                        if (msg.message && msg.message.includes('%')) {
                            const match = msg.message.match(/(\d+)%/);
                            if (match) logProgress.textContent = match[0];
                        }
                    } catch (e) { }
                }
            };

            eventSource.onerror = (e) => {
                eventSource.close();
                console.error("SSE Error:", e);
                addLog("连接数据引擎失败，请重试", "ERROR");
                runBtn.disabled = false;
                spinner.classList.add('hidden');
            };
        });

        function addLog(text, level) {
            const line = document.createElement('div');
            const colorMap = {
                'INFO': 'text-slate-300',
                'DEBUG': 'text-slate-500',
                'WARN': 'text-amber-400',
                'ERROR': 'text-red-400'
            };
            line.className = colorMap[level] || 'text-slate-300';
            line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            logLines.appendChild(line);
            logLines.scrollTop = logLines.scrollHeight;

            // 同时更新主提示语
            if (level === 'INFO') resultInfo.textContent = text;
        }

        async function fetchFinalResults() {
            try {
                const response = await fetch('/api/select_stocks');
                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    renderTable(data.data);
                    resultInfo.textContent = `选股完成！在 ${data.date} 共有 ${data.count} 只个股符合信号`;
                } else {
                    tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-20 text-center text-amber-400 font-medium">未找到符合条件的个股</td></tr>';
                    resultInfo.textContent = '任务已完成，未找到符合条件的个股。';
                }
            } catch (error) {
                console.error(error);
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-20 text-center text-red-500 font-medium">结果拉取失败</td></tr>';
            } finally {
                runBtn.disabled = false;
                spinner.classList.add('hidden');
                // 3秒后隐藏日志区
                setTimeout(() => {
                    logConsole.classList.add('hidden');
                }, 3000);
            }
        }

        function renderTable(stocks) {
            tableBody.innerHTML = '';
            stocks.forEach(s => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors group';
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-mono font-bold text-slate-600">${s.code}</td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-900">${s.name}</td>
                    <td class="px-6 py-4 text-sm font-mono text-slate-700">¥${s.close}</td>
                    <td class="px-6 py-4 text-sm font-mono font-black text-right text-primary">${s.score}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-2 py-1 rounded-md bg-emerald-100 text-emerald-700 text-[10px] font-black uppercase">买入信号</span>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // 设置默认日期为昨天（简单处理）
        window.addEventListener('DOMContentLoaded', () => {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            document.getElementById('target-date').value = d.toISOString().split('T')[0];
        });
    </script>
</body>

</html>
